# 配置说明：本文件负责依赖更新策略，入口文件为 `dependabot.yml`。
# 实现要点：限定依赖生态、更新频率和 PR 数量，避免自动更新干扰正常开发。
# 核心边界：步骤顺序、权限和触发条件共同构成发布安全边界，调整时必须保持最小权限。
# 维护约束：键名、权限、触发条件和步骤顺序都属于行为契约，修改后必须通过仓库完整验证。
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: typescript
        versions:
          - ">=7.0.0 <8.0.0"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

# 配置说明：本文件负责持续集成与发布工作流，入口文件为 `ci.yml`。
# 实现要点：通过固定版本的 Actions、显式权限和分阶段任务连接验证、打包、证明与发布。
# 核心边界：步骤顺序、权限和触发条件共同构成发布安全边界，调整时必须保持最小权限。
# 维护约束：键名、权限、触发条件和步骤顺序都属于行为契约，修改后必须通过仓库完整验证。
name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run verify

  integration:
    name: Extension Host integration
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:integration
        env:
          CODEBOOKMARK_ALLOW_VSCODE_DOWNLOAD: 'true'
          CODEBOOKMARK_VSCODE_TEST_VERSION: '1.130.0'

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm audit --audit-level=low

  package:
    name: Validate VSIX package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - verify
      - integration
      - audit
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run package:vsix -- --out codebookmark-ci.vsix

# 配置说明：本文件负责持续集成与发布工作流，入口文件为 `release.yml`。
# 实现要点：通过固定版本的 Actions、显式权限和分阶段任务连接验证、打包、证明与发布。
# 核心边界：步骤顺序、权限和触发条件共同构成发布安全边界，调整时必须保持最小权限。
# 维护约束：键名、权限、触发条件和步骤顺序都属于行为契约，修改后必须通过仓库完整验证。
name: Release Extension

on:
  push:
    tags:
      - v*

permissions:
  attestations: write
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Test, publish Marketplace, and create GitHub release
    runs-on: windows-latest
    timeout-minutes: 35
    environment: marketplace-release
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run test:integration
        env:
          CODEBOOKMARK_ALLOW_VSCODE_DOWNLOAD: 'true'
          CODEBOOKMARK_VSCODE_TEST_VERSION: '1.130.0'
      - name: Validate Marketplace publishing configuration
        shell: pwsh
        env:
          CONFIRMED_PUBLISHER: ${{ vars.VSCODE_MARKETPLACE_PUBLISHER }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CONFIRMED_PUBLISHER)) {
            throw "Set the VSCODE_MARKETPLACE_PUBLISHER repository variable after registering the immutable Publisher ID."
          }
          $manifestPublisher = node -p "require('./package.json').publisher"
          if ($env:CONFIRMED_PUBLISHER -cne $manifestPublisher) {
            throw "Confirmed publisher '$env:CONFIRMED_PUBLISHER' does not match package publisher '$manifestPublisher'."
          }
          foreach ($variableName in @('AZURE_CLIENT_ID', 'AZURE_TENANT_ID', 'AZURE_SUBSCRIPTION_ID')) {
            $variableValue = [Environment]::GetEnvironmentVariable($variableName)
            if ([string]::IsNullOrWhiteSpace($variableValue)) {
              throw "Set the $variableName repository variable before publishing a release tag."
            }
            try {
              [void][Guid]::Parse($variableValue)
            } catch {
              throw "$variableName must be a valid GUID."
            }
          }
      - name: Validate tag provenance and build release artifacts
        id: artifacts
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          if ($env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match package version $version"
          }
          if ((git cat-file -t $env:GITHUB_REF_NAME) -ne 'tag') {
            throw "Release tag $env:GITHUB_REF_NAME must be an annotated tag."
          }
          git fetch origin main:refs/remotes/origin/main --no-tags
          $tagCommit = git rev-list -n 1 $env:GITHUB_REF_NAME
          git merge-base --is-ancestor $tagCommit origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Release tag $env:GITHUB_REF_NAME does not belong to the main branch history."
          }
          $vsix = "codebookmark-$version.vsix"
          $sbom = "codebookmark-$version.sbom.cdx.json"
          npm run package:vsix -- --out $vsix
          npm run sbom -- $sbom
          node scripts/release/write-sha256sums.js SHA256SUMS $vsix $sbom
          "vsix=$vsix" | Add-Content -Path $env:GITHUB_OUTPUT
          "sbom=$sbom" | Add-Content -Path $env:GITHUB_OUTPUT
      - name: Build Chinese release notes
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          node scripts/release/build-release-notes.js $version "$env:RUNNER_TEMP/release-notes.md"
      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: |
            ${{ steps.artifacts.outputs.vsix }}
            ${{ steps.artifacts.outputs.sbom }}
            SHA256SUMS
      - name: Attest software bill of materials
        uses: actions/attest-sbom@51e74621a501c89df81fc1391c5a8f4cfc9fab2f # v3
        with:
          subject-path: ${{ steps.artifacts.outputs.vsix }}
          sbom-path: ${{ steps.artifacts.outputs.sbom }}
      - name: Authenticate to Microsoft Entra ID
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Publish to VS Code Marketplace
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          npm exec -- vsce publish `
            --azure-credential `
            --packagePath "codebookmark-$version.vsix" `
            --skip-duplicate
      - name: Verify Marketplace package matches VSIX
        shell: pwsh
        run: |
          $publisher = node -p "require('./package.json').publisher"
          $name = node -p "require('./package.json').name"
          $version = node -p "require('./package.json').version"
          $localVsix = "codebookmark-$version.vsix"
          $marketplaceVsix = Join-Path $env:RUNNER_TEMP "marketplace-$version.vsix"
          $downloadUri = "https://marketplace.visualstudio.com/_apis/public/gallery/publishers/$publisher/vsextensions/$name/$version/vspackage"
          for ($attempt = 1; $attempt -le 6; $attempt++) {
            try {
              Invoke-WebRequest -Uri $downloadUri -OutFile $marketplaceVsix -ErrorAction Stop
              break
            } catch {
              if ($attempt -eq 6) { throw }
              Start-Sleep -Seconds 10
            }
          }
          $localHash = (Get-FileHash -Algorithm SHA256 $localVsix).Hash
          $marketplaceHash = (Get-FileHash -Algorithm SHA256 $marketplaceVsix).Hash
          if ($localHash -cne $marketplaceHash) {
            throw "Marketplace package hash does not match the VSIX built from tag $env:GITHUB_REF_NAME."
          }
      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = node -p "require('./package.json').version"
          $vsix = "codebookmark-$version.vsix"
          $sbom = "codebookmark-$version.sbom.cdx.json"
          $releaseNotes = "$env:RUNNER_TEMP/release-notes.md"
          if (gh release view $env:GITHUB_REF_NAME --json tagName 2>$null) {
            gh release edit $env:GITHUB_REF_NAME `
              --title "CodeBookmark v$version" `
              --notes-file $releaseNotes
            gh release upload $env:GITHUB_REF_NAME $vsix $sbom SHA256SUMS --clobber
          } else {
            gh release create $env:GITHUB_REF_NAME $vsix $sbom SHA256SUMS `
              --verify-tag `
              --title "CodeBookmark v$version" `
              --notes-file $releaseNotes
          }

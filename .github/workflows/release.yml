name: Release Extension

on:
  push:
    tags:
      - v*

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Test, publish Marketplace, and create GitHub release
    runs-on: windows-latest
    timeout-minutes: 35
    environment: marketplace-release
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run test:integration
      - name: Validate Marketplace publishing configuration
        shell: pwsh
        env:
          CONFIRMED_PUBLISHER: ${{ vars.VSCODE_MARKETPLACE_PUBLISHER }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CONFIRMED_PUBLISHER)) {
            throw "Set the VSCODE_MARKETPLACE_PUBLISHER repository variable after registering the immutable Publisher ID."
          }
          $manifestPublisher = node -p "require('./package.json').publisher"
          if ($env:CONFIRMED_PUBLISHER -cne $manifestPublisher) {
            throw "Confirmed publisher '$env:CONFIRMED_PUBLISHER' does not match package publisher '$manifestPublisher'."
          }
          foreach ($variableName in @('AZURE_CLIENT_ID', 'AZURE_TENANT_ID', 'AZURE_SUBSCRIPTION_ID')) {
            $variableValue = [Environment]::GetEnvironmentVariable($variableName)
            if ([string]::IsNullOrWhiteSpace($variableValue)) {
              throw "Set the $variableName repository variable before publishing a release tag."
            }
            try {
              [void][Guid]::Parse($variableValue)
            } catch {
              throw "$variableName must be a valid GUID."
            }
          }
      - name: Validate tag and build VSIX
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          if ($env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match package version $version"
          }
          npm run package:vsix -- --out "codebookmark-$version.vsix"
      - name: Authenticate to Microsoft Entra ID
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Publish to VS Code Marketplace
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          npx --yes @vscode/vsce@3.9.2 publish `
            --azure-credential `
            --packagePath "codebookmark-$version.vsix" `
            --skip-duplicate
      - name: Verify Marketplace package matches VSIX
        shell: pwsh
        run: |
          $publisher = node -p "require('./package.json').publisher"
          $name = node -p "require('./package.json').name"
          $version = node -p "require('./package.json').version"
          $localVsix = "codebookmark-$version.vsix"
          $marketplaceVsix = Join-Path $env:RUNNER_TEMP "marketplace-$version.vsix"
          $downloadUri = "https://marketplace.visualstudio.com/_apis/public/gallery/publishers/$publisher/vsextensions/$name/$version/vspackage"
          for ($attempt = 1; $attempt -le 6; $attempt++) {
            try {
              Invoke-WebRequest -Uri $downloadUri -OutFile $marketplaceVsix -ErrorAction Stop
              break
            } catch {
              if ($attempt -eq 6) { throw }
              Start-Sleep -Seconds 10
            }
          }
          $localHash = (Get-FileHash -Algorithm SHA256 $localVsix).Hash
          $marketplaceHash = (Get-FileHash -Algorithm SHA256 $marketplaceVsix).Hash
          if ($localHash -cne $marketplaceHash) {
            throw "Marketplace package hash does not match the VSIX built from tag $env:GITHUB_REF_NAME."
          }
      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = node -p "require('./package.json').version"
          $vsix = "codebookmark-$version.vsix"
          if (gh release view $env:GITHUB_REF_NAME --json tagName 2>$null) {
            gh release upload $env:GITHUB_REF_NAME $vsix --clobber
          } else {
            gh release create $env:GITHUB_REF_NAME $vsix `
              --verify-tag `
              --title "CodeBookmark $version" `
              --generate-notes
          }

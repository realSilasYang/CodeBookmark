# 配置说明：本文件负责持续集成与发布工作流，入口文件为 `marketplace-identity.yml`。
# 实现要点：通过固定版本的 Actions、显式权限和分阶段任务连接验证、打包、证明与发布。
# 核心边界：步骤顺序、权限和触发条件共同构成发布安全边界，调整时必须保持最小权限。
# 维护约束：键名、权限、触发条件和步骤顺序都属于行为契约，修改后必须通过仓库完整验证。
name: Resolve Marketplace Identity

on:
  workflow_dispatch:
    inputs:
      verify_marketplace_access:
        description: Verify that the managed identity can publish for the configured Publisher
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  resolve:
    name: Resolve managed identity resource ID
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: marketplace-release
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        if: ${{ inputs.verify_marketplace_access }}
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        if: ${{ inputs.verify_marketplace_access }}
        with:
          node-version: 24
          cache: npm
      - if: ${{ inputs.verify_marketplace_access }}
        run: npm ci
      - name: Validate Microsoft Entra ID configuration
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          foreach ($variableName in @('AZURE_CLIENT_ID', 'AZURE_TENANT_ID', 'AZURE_SUBSCRIPTION_ID')) {
            $variableValue = [Environment]::GetEnvironmentVariable($variableName)
            if ([string]::IsNullOrWhiteSpace($variableValue)) {
              throw "Set the $variableName repository variable before resolving the Marketplace identity."
            }
            try {
              [void][Guid]::Parse($variableValue)
            } catch {
              throw "$variableName must be a valid GUID."
            }
          }
      - name: Authenticate to Microsoft Entra ID
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Resolve Marketplace identity resource ID
        shell: pwsh
        run: |
          $profile = az rest `
            --method get `
            --uri https://app.vssps.visualstudio.com/_apis/profile/profiles/me `
            --resource 499b84ac-1321-427f-aa17-267ca6975798 | ConvertFrom-Json
          if ([string]::IsNullOrWhiteSpace($profile.id)) {
            throw "Azure DevOps Profile API did not return the managed identity resource ID."
          }
          @(
            '## Marketplace identity resource ID'
            ''
            'Add this non-secret ID to Publisher `realSilasYang` as a `Contributor`:'
            ''
            ('`{0}`' -f $profile.id)
          ) | Add-Content -Path $env:GITHUB_STEP_SUMMARY
      - name: Verify Marketplace publishing permission
        if: ${{ inputs.verify_marketplace_access }}
        shell: pwsh
        env:
          PUBLISHER: ${{ vars.VSCODE_MARKETPLACE_PUBLISHER }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PUBLISHER)) {
            throw 'Set the VSCODE_MARKETPLACE_PUBLISHER repository variable before verifying Marketplace access.'
          }
          npm exec -- vsce verify-pat --azure-credential $env:PUBLISHER

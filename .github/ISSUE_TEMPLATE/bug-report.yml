name: 缺陷报告
description: 报告可以稳定复现的功能错误或异常行为
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: 提交前请移除 API Key、书签配置内容和本机敏感路径。安全漏洞请使用私密漏洞报告，不要创建公开 Issue。
  - type: input
    id: extension-version
    attributes:
      label: CodeBookmark 版本
      placeholder: 例如 1.0.0
    validations:
      required: true
  - type: input
    id: vscode-version
    attributes:
      label: VS Code 版本
      placeholder: 例如 1.125.0
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: 操作系统
      placeholder: 例如 Windows 11、macOS 15 或 Ubuntu 24.04
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请提供最短、稳定的复现过程。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志与补充信息
      description: 可以粘贴经过脱敏的 CodeBookmark 输出日志、截图或最小示例。

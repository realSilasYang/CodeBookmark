name: 功能建议
description: 提议新的工作流、能力或现有功能改进
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请说明当前工作流中具体遇到了什么困难。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 请描述期望的交互、行为和适用范围。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
  - type: textarea
    id: context
    attributes:
      label: 补充信息
